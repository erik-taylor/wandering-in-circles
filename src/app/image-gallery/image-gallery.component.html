

<div *ngIf="newImgArr.length > 0">
    <div class="shuffle-wrapper">
        <pagination-controls (pageChange)="page = $event" class="pagination"></pagination-controls>
        <!-- <button type="button" (click)="shuffleImages()" class="btn-shuffle" *ngIf="!imageFetchError">Shuffle Images</button> -->
    </div>
    <div class="grid-container">
        <img 
            *ngFor="let img of newImgArr | paginate: {itemsPerPage: 40, currentPage: page}" 
            [ngSrc]="img"
            width="500" 
            height="700"  
            [alt]="img" 
            class="image" 
            loading="lazy"
        />
    </div>
    <div class="shuffle-wrapper">
        <pagination-controls (pageChange)="page = $event" class="pagination"></pagination-controls>
        <!-- <button type="button" (click)="shuffleImages()" class="btn-shuffle" *ngIf="!imageFetchError">Shuffle Images</button> -->
    </div>
</div>
<div id="error-message" class="rock-salt" *ngIf="imageFetchError">
    <h1>OH NOES... Failed to load any images... Have you tried reloading?</h1>
</div>

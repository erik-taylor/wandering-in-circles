<button (click)="shuffleImages()" class="btn-shuffle">Shuffle Images</button>

<div class="grid-container">
    <img 
        *ngFor="let img of newImgArr" 
        [ngSrc]="img"
        width="400" 
        height="600"  
        [alt]="img" 
        class="image" 
        loading="lazy"
    />
</div>

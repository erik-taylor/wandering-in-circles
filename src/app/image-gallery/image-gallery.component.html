<button (click)="shuffleImages()" class="btn-shuffle">Shuffle Images</button>
<!-- <button (click)="fetchImages()" class="btn-shuffle">Fetch Images</button> -->
<div class="grid-container">
    <img 
        *ngFor="let img of newImgArr.slice(0, 25)" 
        [ngSrc]="img"
        width="400" 
        height="600"  
        [alt]="img" 
        class="image" 
        loading="lazy"
    />
</div>
<div id="scroll-observer"></div>
